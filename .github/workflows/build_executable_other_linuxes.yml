name: Build Executables for other Linuxes

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-linux-distros:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - name: debian
            image: debian:stable-slim
          - name: fedora
            image: fedora:latest
          - name: arch
            image: archlinux:latest
          - name: manjaro
            image: manjaro:latest
            # manjaro image may require a different base; adjust if needed

    env:
      APP_NAME: chord-transition-trainer
      MAIN_PY: chord-transition-trainer.py

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build in ${{ matrix.distro.name }} container
        run: |
          docker run --rm \
            -v "$PWD":/src \
            -w /src \
            ${{ matrix.distro.image }} \
            /bin/sh -s <<'EOF'
          set -e

          build_pyinstaller() {
            python3 -m pip install --upgrade pip
            if [ -f requirements.txt ]; then
              python3 -m pip install -r requirements.txt
            fi
            python3 -m pip install pyinstaller
            pyinstaller --windowed --onefile --name "$1" "$2"
          }

          if command -v apt-get >/dev/null 2>&1; then
            apt-get update && \
            apt-get install -y python3 python3-pip python3-venv build-essential
            build_pyinstaller "${APP_NAME}-${DISTRO_NAME}" "${MAIN_PY}"
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y python3 python3-pip python3-virtualenv gcc
            build_pyinstaller "${APP_NAME}-${DISTRO_NAME}" "${MAIN_PY}"
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Syu --noconfirm python python-pip base-devel
            build_pyinstaller "${APP_NAME}-${DISTRO_NAME}" "${MAIN_PY}"
          else
            echo "Unknown distro base in container $IMAGE" >&2
            exit 1
          fi
          EOF
        env:
          APP_NAME: chord-transition-trainer
          MAIN_PY: chord-transition-trainer.py
          DISTRO_NAME: ${{ matrix.distro.name }}
          IMAGE: ${{ matrix.distro.image }}
